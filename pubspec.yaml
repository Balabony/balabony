name: balabony_ai
description: Balabony AI - Voice Companion for Elderly Ukrainians
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Audio recording
  record: ^5.0.0
  
  # Audio playback
  just_audio: ^0.9.36
  
  # HTTP requests
  dio: ^5.3.0
  http: ^1.1.0
  http_parser: ^4.0.2
  
  # Environment variables
  flutter_dotenv: ^5.1.0
  
  # Haptics
  vibration: ^1.8.4
  
  # Permissions
  permission_handler: ^11.0.0
  
 
  
  # Shared preferences
  shared_preferences: ^2.2.2
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - .env
